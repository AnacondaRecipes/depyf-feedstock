{% set name = "depyf" %}
{% set version = "0.18.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/depyf-{{ version }}.tar.gz
  sha256: b99f0c383be949ae45d5d606fe444c71f375b55a57b8d6b20e7856670d52130d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.7
    - pip
    - git
  run:
    - python >=3.7
    - astor
    - dill
    

test:
  imports:
    - depyf
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/thuml/depyf
  summary: Decompile python functions, from bytecode to source code!
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/thuml/depyf
  doc_url: https://github.com/thuml/depyf/tree/master/docs

extra:
  anaconda-services:
    ref: https://anaconda.zendesk.com/agent/tickets/49522
    reason: Dependency for vllm
  recipe-maintainers:
    - ianaobi
  recipe-maintainers:
    - maresb
