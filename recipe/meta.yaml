{% set name = "depyf" %}
{% set version = "0.19.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/depyf-{{ version }}.tar.gz
  sha256: afed0916b32d141cc90fa6220df01885eda442ca43b297d5050eeb90b4a5cb44

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python
    - setuptools
    - pip
    - git
    - wheel
  run:
    - python
    - astor
    - dill

test:
  imports:
    - depyf
  commands:
    - pip check
  requires:
    - python
    - pip

about:
  home: https://github.com/thuml/depyf
  summary: Decompile python functions, from bytecode to source code!
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/thuml/depyf
  doc_url: https://github.com/thuml/depyf/tree/master/docs

extra:
  anaconda-services:
    ref: https://anaconda.zendesk.com/agent/tickets/49522
    reason: Dependency for vllm
  recipe-maintainers:
    - ianaobi
    - bkreider
  recipe-maintainers:
    - maresb
